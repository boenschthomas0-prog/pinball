; Defines the view mode used when running a table
; 0 - Desktop (default)
; 1 - Fullscreen: Gives you a top-down view on the playfield. For cabinet use or multi-window on desktop.
; 2 - Full Single Screen (FSS): Tries to show the whole machine including backglass if set up by the tabledesigner. Falls back to desktop view.
BGSet = 0
; Eventually sync the frame flip with the refresh rate of your monitor
; 0 - None (default): Custom snchronization (see MaxFramerate)
; 1 - Vertical Sync: Synchronize on max frame rate and video sync to avoid video tearing, but with higher input latency and higher risk of stutters.
; 2 - Adaptive Sync: OpenGL only, same as vertical sync synchronization except for late frames (below playfield display refresh rate), deprecated in favor of BGFX multithreading + none
; 3 - Frame Pacing: OpenGL only, try to balance real time simulation with low input- and video-latency by dynamically syncing/adjusting framerate, deprecated in favor of BGFX multithreading
SyncMode = 0
; Maximum frame rate (with a minimum of 24FPS)
; -1 - Playfield display refresh rate (default)
;  0 - Unbound frame rate
MaxFramerate = -1.0
; Correction expressed in milliseconds applied to ball rendering to account for visual latency
; -1 - Default derived from target FPS
;  0 - Disabled
VisualLatencyCorrection =
; Maximum number of 'frames in flight', that is to say, frames pushed to the GPU waiting for rendering
; 0 - System default (default)
MaxPrerenderedFrames = 
; Anti-aliasing
; 0 - Disabled
; 1 - Fast FXAA
; 2 - Standard FXAA
; 3 - Quality FXAA
; 4 - Fast NFAA
; 5 - Standard DLLA
; 6 - Quality SMAA
FXAA = 
; Sharpen
; 0 - Disabled
; 1 - CAS
; 2 - Bilateral CAS
Sharpen = 
ScaleFXDMD = 
; Ambient Occlusion
; 0 = Enabled
; 1 = Disabled
DisableAO = 
; Ambient Occlusion Settings
; 0 = Static
; 1 = Dynamic
DynamicAO = 
; Screen Space Reflections
; 0 - Disable screen space reflections
; 1 - Enable screen space reflections
SSRefl = 
; Playfield Reflection
; 0 = Disable reflections (default?)
; 1 = Balls only
; 2 = Static only
; 3 = Static and balls
; 4 = Static and unsynced dynamics
; 5 = Dynamic
PFReflection = 
; Max Texture Dimension
; 0 - Unlimited (default)
MaxTexDimension = 0
; Anti-aliasing Supersampling
; 0.00 to 2.00
AAFactor = 
; MSAA Samples
; 0 - None
; 4 - 4 samples
; 6 - 6 samples
; 8 - 8 samples
MSAASamples = 
DisableDWM = 
UseNVidiaAPI = 
HDRDisableToneMapper = 
HDRGlobalExposure = 
