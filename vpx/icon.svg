<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="ball" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#dddddd"/>
      <stop offset="100%" stop-color="#666666"/>
    </radialGradient>
    <linearGradient id="cabinet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a1f6e"/>
      <stop offset="100%" stop-color="#0a0a25"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#cc2200"/>
    </linearGradient>
  </defs>
  <!-- Cabinet -->
  <rect x="8" y="4" width="112" height="120" rx="12" fill="url(#cabinet)" stroke="#ffcc00" stroke-width="3"/>
  <!-- Screen / playfield -->
  <rect x="20" y="14" width="88" height="62" rx="4" fill="url(#screen)"/>
  <!-- Blitz auf Display -->
  <polygon points="62,22 50,46 62,46 56,68 78,38 64,38 70,22" fill="#ffff00" stroke="#000" stroke-width="1"/>
  <!-- Flippers -->
  <rect x="28" y="90" width="32" height="8" rx="4" fill="#ffcc00" transform="rotate(-15 44 94)"/>
  <rect x="68" y="90" width="32" height="8" rx="4" fill="#ffcc00" transform="rotate(15 84 94)"/>
  <!-- Ball -->
  <circle cx="64" cy="86" r="9" fill="url(#ball)" stroke="#222" stroke-width="1"/>
  <!-- Text PINBALL -->
  <text x="64" y="118" font-family="Impact, sans-serif" font-size="14" font-weight="bold"
        fill="#ffcc00" text-anchor="middle" stroke="#000" stroke-width="0.5">PINBALL</text>
</svg>
